name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bfm_user
          POSTGRES_PASSWORD: bfm_pass
          POSTGRES_DB: barrage_flow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint with ruff
        working-directory: backend
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://bfm_user:bfm_pass@localhost:5432/barrage_flow_test
          SECRET_KEY: ci-test-secret-key-do-not-use-in-production
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://bfm_user:bfm_pass@localhost:5432/barrage_flow_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-do-not-use-in-production
          DEBUG: "true"
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build ./backend -t barrage-flow-backend:test
